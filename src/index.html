<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>INTRUDER...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="icon" sizes="32x32" href="/src/img/logo.png?as=webp" />
    <meta
      name="description"
      content="Jeu vidéo réaliser entièrement en Frontend et Blender. Projet eikon S6."
    />
  </head>
  <body>
    <audio
      id="hover-sound"
      class="sound-click"
      src="sound/click/hover-button.mp3"
      preload="auto"
    ></audio>
    <audio
      id="camera-sound"
      class="sound-click"
      src="sound/click/change-camera.mp3"
      preload="auto"
    ></audio>
    <audio
      id="monster-glitch-sound"
      class="sound-music"
      src="sound/noise/gltich-monster-foundv2.mp3"
      preload="auto"
    ></audio>
    <audio
      id="iiii-sound"
      class="sound-music"
      src="sound/noise/iiii-hearv2.mp3"
      preload="auto"
    ></audio>
    <audio
      id="dead-sound"
      class="sound-music"
      src="sound/noise/sound-dead.mp3"
      preload="auto"
      loop
    ></audio>
    <audio
      id="time-sound"
      class="sound-music"
      src="sound/noise/time.mp3"
      preload="auto"
    ></audio>
    <audio
      id="ambiance-music"
      class="sound-music"
      src="sound/music/sound-ambiance.mp3"
      preload="auto"
      loop
    ></audio>
    <audio
      id="first-screen-music"
      class="sound-music"
      src="sound/music/first-sreen.mp3"
      preload="auto"
      loop
    ></audio>
    <audio
      id="win-sound"
      class="sound-music"
      src="sound/music/feldup-ambiance.mp3"
      preload="auto"
      loop
    ></audio>
    <audio
      id="missed-sound"
      class="sound-click"
      src="sound/click/sound-missed.mp3"
      preload="auto"
    ></audio>
    <audio
      id="loading-sound"
      class="sound-click"
      src="sound/click/loadingv-4.mp3"
      preload="auto"
    ></audio>
    <audio
      id="r-door-sound"
      class="sound-music"
      src="sound/noise/right-door.mp3"
      preload="auto"
    ></audio>
    <audio
      id="l-door-sound"
      class="sound-music"
      src="sound/noise/left-door.mp3"
      preload="auto"
    ></audio>
    <audio
      id="wiiin-sound"
      class="sound-music"
      src="sound/noise/win-iiii.mp3"
      preload="auto"
      loop
    ></audio>
    <div id="how-to-play">
      <div id="how-to-play-box">
        <h2 id="game-title">HOW TO PLAY...</h2>
        <p>Find the intrudes and survive the night !</p>
        <button id="skip-button" class="difficulty-button">
          <h2>START</h2>
        </button>
      </div>
    </div>
    <div id="first-screen">
      <div class="fisrt-title">
        <h1 id="game-title-intro">
          INTRUDER<span class="point-animation p-a-1">.</span
          ><span class="point-animation p-a-2">.</span
          ><span class="point-animation p-a-3">.</span>
        </h1>
        <div class="button-container-first">
          <button class="difficulty-button" id="level-button">
            <h2>PLAY</h2>
          </button>
          <button class="difficulty-button" id="setting-button-first">
            <h2>SETTINGS</h2>
          </button>
        </div>
        <div class="fisrt-information">
          <p>
            A game by
            <a href="https://amelie-rakowiecki.alwaysdata.net/portfolio/"
              >Rakowiecki Amélie</a
            >
          </p>
          <p>
            <a href="https://github.com/philippedward/intruder.git">GitHub</a>
          </p>
        </div>
      </div>
      <div class="follow-mouse">
        <img class="outside" src="img/base-code.png" alt="le tour de loeil" />
        <img class="insdie" src="img/eye-code.png" alt="un oeil en blanc" />
        <video class="image-animation" autoplay muted loop>
          <source src="video/animation-logo.mp4" type="video/mp4" />
        </video>
      </div>
    </div>
    <div id="start-screen">
      <h1 id="game-title">LEVELS<span class="point-animation-p">.</span></h1>
      <div class="button-container button-container-first">
        <button class="difficulty-button" data-difficulty="normal">
          <h2>NORMAL</h2>
        </button>
        <button class="difficulty-button" data-difficulty="hard" disabled>
          <h2>HARD</h2>
        </button>
        <button class="difficulty-button panel-back-icon" id="back-to-first">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="11"
            viewBox="0 0 18 11"
            fill="none"
          >
            <path
              d="M16.1053 0.916667V4.58333H3.62842L7.02 1.2925L5.68421 0L0 5.5L5.68421 11L7.02 9.69833L3.62842 6.41667H18V0.916667H16.1053Z"
              fill="white"
            />
          </svg>
          <h2>RETURN</h2>
        </button>
      </div>
    </div>
    <button id="menu-button">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="40"
        height="40"
        viewBox="0 0 211 211"
        fill="none"
      >
        <path
          d="M105.5 0C163.766 0 211 47.234 211 105.5C211 163.766 163.766 211 105.5 211C47.234 211 0 163.766 0 105.5C0 47.234 47.234 0 105.5 0ZM64.2998 136.75C61.5682 136.75 58.9482 137.835 57.0166 139.767C55.0851 141.698 54.0001 144.318 54 147.05C54 149.781 55.0852 152.401 57.0166 154.333C58.9482 156.265 61.5681 157.351 64.2998 157.351H146.7C149.432 157.351 152.052 156.265 153.983 154.333C155.915 152.401 157 149.781 157 147.05C157 144.318 155.915 141.698 153.983 139.767C152.052 137.835 149.432 136.75 146.7 136.75H64.2998ZM64.2998 95.375C61.5682 95.3751 58.9482 96.4601 57.0166 98.3916C55.085 100.323 54.0001 102.943 54 105.675C54 108.406 55.0851 111.026 57.0166 112.958C58.9482 114.89 61.5681 115.976 64.2998 115.976H146.7C149.432 115.976 152.052 114.89 153.983 112.958C155.915 111.026 157 108.406 157 105.675C157 102.943 155.915 100.323 153.983 98.3916C152.052 96.4601 149.432 95.3751 146.7 95.375H64.2998ZM64.2998 54C61.5681 54.0001 58.9482 55.085 57.0166 57.0166C55.085 58.9482 54.0001 61.5681 54 64.2998C54 67.0314 55.0851 69.6514 57.0166 71.583C58.9482 73.5146 61.5681 74.5996 64.2998 74.5996H146.7C149.432 74.5996 152.052 73.5146 153.983 71.583C155.915 69.6514 157 67.0314 157 64.2998C157 61.5681 155.915 58.9482 153.983 57.0166C152.052 55.085 149.432 54.0001 146.7 54H64.2998Z"
          fill="white"
        />
      </svg>
    </button>
    <div id="pause-menu" style="display: none">
      <div class="game-title-mouve">
        <h1 id="pause-title">
          PAUSED
          <span class="point-animation-p">.</span>
        </h1>
      </div>

      <div id="pause-main-buttons" class="button-container">
        <button class="difficulty-button" id="resume-button">
          <h2>CONTINUE</h2>
        </button>
        <button class="difficulty-button" id="setting-button">
          <h2>SETTINGS</h2>
        </button>
        <button class="difficulty-button panel-back-icon" id="quit-button">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="11"
            viewBox="0 0 18 11"
            fill="none"
          >
            <path

              fill="white"
            />
          </svg>
          <h2>LEAVE</h2>
        </button>
      </div>

      <div id="settings-main" style="display: none" class="button-container">
        <button class="difficulty-button" id="btn-graphics">
          <h2>GRAPHIC</h2>
        </button>
        <button class="difficulty-button" id="btn-sound">
          <h2>SOUNDS</h2>
        </button>
        <button class="difficulty-button" id="btn-controls">
          <h2>CONTROL</h2>
        </button>
        <button class="difficulty-button panel-back-icon" id="settings-back">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="11"
            viewBox="0 0 18 11"
            fill="none"
          >
            <path
              d="M16.1053 0.916667V4.58333H3.62842L7.02 1.2925L5.68421 0L0 5.5L5.68421 11L7.02 9.69833L3.62842 6.41667H18V0.916667H16.1053Z"
              fill="white"
            />
          </svg>
          <h2>RETURN</h2>
        </button>
      </div>
      <div id="panel-graphics" style="display: none" class="setting-panel">
        <div class="setting-row">
          <h2>BRIGHTNESS</h2>
          <input
            type="range"
            id="brightness-slider"
            min="0"
            max="100"
            value="50"
          />
          <h2 id="brightness-value">50%</h2>
        </div>
        <button class="difficulty-button panel-back panel-back-icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="11"
            viewBox="0 0 18 11"
            fill="none"
          >
            <path
              d="M16.1053 0.916667V4.58333H3.62842L7.02 1.2925L5.68421 0L0 5.5L5.68421 11L7.02 9.69833L3.62842 6.41667H18V0.916667H16.1053Z"
              fill="white"
            />
          </svg>
          <h2>RETURN</h2>
        </button>
      </div>
      <div id="panel-sound" style="display: none" class="setting-panel">
        <div class="setting-row">
          <h2>GENERAL</h2>
          <input type="range" id="master-slider" min="0" max="100" value="50" />
          <h2 id="master-value">50%</h2>
        </div>
        <div class="setting-row">
          <h2>MUSIC</h2>
          <input type="range" id="music-slider" min="0" max="100" value="50" />
          <h2 id="music-value">50%</h2>
        </div>
        <div class="setting-row">
          <h2>CLICK</h2>
          <input type="range" id="click-slider" min="0" max="100" value="50" />
          <h2 id="click-value">50%</h2>
        </div>
        <button class="difficulty-button panel-back panel-back-icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="11"
            viewBox="0 0 18 11"
            fill="none"

            <path
              d="M16.1053 0.916667V4.58333H3.62842L7.02 1.2925L5.68421 0L0 5.5L5.68421 11L7.02 9.69833L3.62842 6.41667H18V0.916667H16.1053Z"
              fill="white"
            />
          </svg>
          <h2>RETURN</h2>
        </button>
      </div>
      <div id="panel-controls" style="display: none" class="setting-panel">
        <div class="setting-row">
          <h2>MOUSE SENSITIVITY</h2>
          <input
            type="range"
            id="sensitivity-slider"
            min="1"
            max="10"
            value="5"
          />
          <h2 id="sensitivity-value">5</h2>
        </div>
        <button class="difficulty-button panel-back panel-back-icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="11"
            viewBox="0 0 18 11"
            fill="none"
          >
            <path
              d="M16.1053 0.916667V4.58333H3.62842L7.02 1.2925L5.68421 0L0 5.5L5.68421 11L7.02 9.69833L3.62842 6.41667H18V0.916667H16.1053Z"
              fill="white"
            />
          </svg>
          <h2>RETURN</h2>
        </button>
      </div>
    </div>

      </div>
    </div>

    <script src="js/main.js" type="module"></script>

</html>
